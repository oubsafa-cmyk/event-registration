<title>Inscription - BTP PROCONSTRUCT 2026</title>
<style>
    /* Styles généraux de la page */
    body {
        background-color: #f7f9fc;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px;
        min-height: 100vh;
    }

    /* Conteneur élargi pour les 2 colonnes */
    #main-container {
        background-color: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        overflow: hidden;
        max-width: 850px; 
        width: 100%;
        margin-bottom: 20px;
    }

    #event-banner {
        width: 100%;
        display: block;
    }

    #btp-form {
        padding: 40px;
    }

    #form-title {
        color: #1a1a1a;
        margin-top: 0;
        font-size: 1.8em;
        text-align: center;
        margin-bottom: 15px;
    }

    #welcome-text {
        color: #666;
        font-size: 0.95em;
        text-align: center;
        line-height: 1.6;
        margin-bottom: 35px;
        padding: 0 50px;
    }

    /* MISE EN PAGE 2 COLONNES */
    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr; /* Deux colonnes égales */
        gap: 20px 30px; /* Espace entre colonnes et lignes */
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    label {
        margin-bottom: 8px;
        color: #444;
        font-weight: 600;
        font-size: 0.9em;
    }

    /* Etoile rouge pour les champs obligatoires */
    .required {
        color: #ff4d4f;
        margin-left: 4px;
    }

    input[type=text], select {
        width: 100%;
        padding: 12px;
        border: 1px solid #d1d9e6;
        border-radius: 6px;
        font-size: 1em;
        color: #333;
        box-sizing: border-box;
    }

    input[required] {
        border-left: 3px solid #ff4d4f;
    }

    input:focus, select:focus {
        border-color: #1a1a1a;
        outline: none;
        box-shadow: 0 0 5px rgba(26, 26, 26, 0.1);
    }

    /* Le bouton prend toute la largeur des 2 colonnes */
    .full-width {
        grid-column: span 2;
        margin-top: 20px;
    }

    input[type=submit] {
        background-color: #1a1a1a;
        color: white;
        padding: 18px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-size: 1.1em;
        font-weight: 700;
        text-transform: uppercase;
        transition: 0.3s;
    }

    input[type=submit]:hover {
        background-color: #333;
        transform: translateY(-1px);
    }

    /* Responsive : Repasse en 1 colonne sur mobile */
    @media (max-width: 700px) {
        .form-grid { grid-template-columns: 1fr; }
        .full-width { grid-column: span 1; }
        #main-container { margin: 10px; }
    }
</style>
</head>
