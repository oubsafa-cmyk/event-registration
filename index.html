<!DOCTYPE html>

<html lang="fr">

<head>

<META HTTP-EQUIV="Content-type" CONTENT="text/html; charset=UTF-8">

<title>Inscription - BTP PROCONSTRUCT 2026</title>

<style>

    /* Styles généraux de la page */

    body {

        background-color: #f7f9fc; /* Gris très clair de fond */

        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

        margin: 0;

        display: flex;

        flex-direction: column;

        align-items: center;

        padding: 40px;

    }



    /* Conteneur principal qui contient l'image ET le formulaire */

    #main-container {

        background-color: white;

        border-radius: 8px;

        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);

        overflow: hidden; /* Pour que les coins de l'image respectent l'arrondi du conteneur */

        max-width: 500px; /* Ajusté pour correspondre à la largeur de l'image */

        width: 100%;

        margin-bottom: 20px;

    }



    /* Style de la bannière d'image */

    #event-banner {

        width: 100%;

        display: block; /* Supprime l'espace blanc sous l'image */

    }



    /* Style du formulaire en lui-même */

    #btp-form {

        padding: 30px;

    }



    /* Style des titres */

    #form-title {

        color: #1a1a1a;

        margin-top: 0;

        font-size: 1.5em;

        text-align: center;

        margin-bottom: 25px;

    }



    /* Style des labels (First Name, Email, etc.) */

    label {

        display: block;

        margin-bottom: 8px;

        color: #5a5a5a;

        font-weight: 600;

        font-size: 0.9em;

    }



    /* Style des champs de saisie (input text, select, email) */

    input[type=text], select {

        width: 100%;

        padding: 12px;

        margin-bottom: 20px;

        border: 1px solid #d1d9e6;

        border-radius: 4px;

        background-color: #ffffff;

        box-sizing: border-box; /* Crucial pour que le padding n'augmente pas la largeur totale */

        font-size: 1em;

        color: #333;

    }



    /* Style spécifique pour les champs obligatoires (Last Name) */

    input[required] {

        border-left: 3px solid #ff4d4f; /* Petite barre rouge à gauche */

    }



    /* Style des champs au focus (clic) */

    input[type=text]:focus, select:focus {

        border-color: #333; /* Noir/gris foncé pour le focus */

        outline: none;

        box-shadow: 0 0 5px rgba(51, 51, 51, 0.2);

    }



    /* Style du bouton d'envoi */

    input[type=submit] {

        background-color: #1a1a1a; /* Noir/gris foncé de BTP PROCONSTRUCT */

        color: white;

        padding: 15px 20px;

        border: none;

        border-radius: 4px;

        cursor: pointer;

        width: 100%;

        font-size: 1.1em;

        font-weight: 700;

        text-transform: uppercase;

        transition: background-color 0.3s;

        box-shadow: 0 2px 5px rgba(0,0,0,0.1);

    }



    /* Effet au survol du bouton */

    input[type=submit]:hover {

        background-color: #333; /* Noir/gris foncé légèrement plus clair au survol */

    }



    /* Style pour le texte de bienvenue sous l'image */

    #welcome-text {

        color: #666;

        font-size: 0.9em;

        text-align: center;

        line-height: 1.6;

        margin-top: -15px; /* Rapproche le texte de l'image */

        padding: 0 30px;

        margin-bottom: 25px;

    }



</style>

</head>

<body>



    <div id="main-container">



        <img id="event-banner" src="https://i.postimg.cc/02ysVvb5/Gemini-Generated-Image-dkr0t1dkr0t1dkr0.png" alt="BTP PROCONSTRUCT 2026 - Sommet Innovation Chantier">



        <h2 id="form-title">FORMULAIRE D'INSCRIPTION</h2>

        

        <p id="welcome-text">

            Bienvenue au Sommet Innovation Chantier BTP PROCONSTRUCT 2026. <br>

            Veuillez remplir le formulaire ci-dessous pour réserver votre place. <br>

            Une confirmation de votre demande vous sera envoyée par e-mail selon la disponibilité des places.

        </p>



        <form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00Dg5000004tHqj" method="POST" id="btp-form">



            <input type=hidden name="oid" value="00Dg5000004tHqj">

            

            <input type=hidden name="retURL" value="https://oubsafa-cmyk.github.io/event-registration/merci.html">



            <input type="hidden" id="event_field" name="Target_Event_ID__c" value="">



            <label for="salutation">Salutation</label>

            <select id="salutation" name="salutation">

                <option value="">--None--</option>

                <option value="Mr.">Mr.</option>

                <option value="Ms.">Ms.</option>

            </select>



            <label for="first_name">First Name</label><input id="first_name" name="first_name" type="text" />

            

            <label for="last_name">Last Name</label><input id="last_name" name="last_name" type="text" required />

            

            <label for="email">Email professionnel</label><input id="email" name="email" type="text" />

            <label for="mobile">Mobile</label><input id="mobile" name="mobile" type="text" />



            <label for="industry">Industry</label>

            <select id="industry" name="industry">

                <option value="Construction">Construction</option>

                <option value="Engineering">Engineering</option>

                <option value="Communications">Communications</option>

                <option value="Electronics">Electronics</option>

                <option value="Energy">Energy</option>

                <option value="Technology">Technology</option>

                <option value="Telecommunications">Telecommunications</option>

                <option value="Transportation">Transportation</option>

                <option value="Other">Other</option>

            </select>



            <label for="company">Company</label><input id="company" name="company" type="text" />

            <label for="city">City</label><input id="city" name="city" type="text" />



            <input type="submit" name="submit" value="Envoyer ma demande d'inscription">



        </form>

    </div>



<script>

    // Script pour capturer l'ID de l'événement dans l'URL (?eventid=XXXX)

    window.onload = function() {

        const urlParams = new URLSearchParams(window.location.search);

        const eventIdFromUrl = urlParams.get('eventid');



        if (eventIdFromUrl) {

            document.getElementById('event_field').value = eventIdFromUrl;

            console.log("ID Event détecté : " + eventIdFromUrl);

        } else {

            console.warn("Attention : Aucun ID d'événement trouvé dans l'URL.");

        }

    };

</script>



</body>

</html>
