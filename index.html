<!DOCTYPE html>
<html lang="fr">
<head>
<META HTTP-EQUIV="Content-type" CONTENT="text/html; charset=UTF-8">
<title>Inscription - BTP PROCONSTRUCT 2026</title>
<style>
    body {
        background-color: #f7f9fc;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px;
        min-height: 100vh;
    }

    #main-container {
        background-color: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        overflow: hidden;
        max-width: 850px; 
        width: 100%;
    }

    /* La bannière visuelle du sommet 2026 */
    #event-banner {
        width: 100%;
        display: block;
    }

    #btp-form-wrapper {
        padding: 40px;
    }

    h2 {
        color: #1a1a1a;
        margin-top: 0;
        font-size: 1.8em;
        text-align: center;
        margin-bottom: 10px;
        text-transform: uppercase;
    }

    #welcome-text {
        color: #666;
        font-size: 0.95em;
        text-align: center;
        line-height: 1.6;
        margin-bottom: 35px;
    }

    /* GRILLE 2 COLONNES */
    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px 30px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    label {
        margin-bottom: 8px;
        color: #444;
        font-weight: 600;
        font-size: 0.9em;
    }

    .required {
        color: #ff4d4f;
        margin-left: 4px;
    }

    input[type=text], select {
        width: 100%;
        padding: 12px;
        border: 1px solid #d1d9e6;
        border-radius: 6px;
        font-size: 1em;
        box-sizing: border-box;
    }

    /* Indicateur visuel pour champs obligatoires */
    input[required], select[required] {
        border-left: 3px solid #ff4d4f;
    }

    .full-width {
        grid-column: span 2;
        margin-top: 20px;
    }

    input[type=submit] {
        background-color: #1a1a1a;
        color: white;
        padding: 18px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-size: 1.1em;
        font-weight: 700;
        text-transform: uppercase;
        transition: 0.3s;
    }

    input[type=submit]:hover {
        background-color: #333;
    }

    @media (max-width: 700px) {
        .form-grid { grid-template-columns: 1fr; }
        .full-width { grid-column: span 1; }
    }
</style>
</head>
<body>

    <div id="main-container">
        <img id="event-banner" src="https://i.postimg.cc/02ysVvb5/Gemini-Generated-Image-dkr0t1dkr0t1dkr0.png" alt="Bannière BTP PROCONSTRUCT 2026">

        <div id="btp-form-wrapper">
            <h2>Formulaire d'inscription</h2>
            <p id="welcome-text">
                Bienvenue au Sommet Innovation Chantier BTP PROCONSTRUCT 2026. <br>
                Veuillez remplir le formulaire ci-dessous pour réserver votre place.
            </p>

            <form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00Dg5000004tHqj" method="POST">

                <input type="hidden" name="oid" value="00Dg5000004tHqj">
                <input type="hidden" name="retURL" value="https://oubsafa-cmyk.github.io/event-registration/merci.html">
                <input type="hidden" id="event_field" name="Target_Event_ID__c" value="">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Salutation<span class="required">*</span></label>
                        <select name="salutation" required>
                            <option value="">--Choisir--</option>
                            <option value="Mr.">Mr.</option>
                            <option value="Ms.">Ms.</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Secteur d'activité</label>
                        <select name="industry">
                            <option value="Construction">Construction</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Technology">Technology</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Prénom<span class="required">*</span></label>
                        <input name="first_name" type="text" required />
                    </div>

                    <div class="form-group">
                        <label>Nom<span class="required">*</span></label>
                        <input name="last_name" type="text" required />
                    </div>

                    <div class="form-group">
                        <label>Email professionnel</label>
                        <input name="email" type="text" />
                    </div>

                    <div class="form-group">
                        <label>Mobile</label>
                        <input name="mobile" type="text" />
                    </div>

                    <div class="form-group">
                        <label>Entreprise<span class="required">*</span></label>
                        <input name="company" type="text" required />
                    </div>

                    <div class="form-group">
                        <label>Ville<span class="required">*</span></label>
                        <input name="city" type="text" required />
                    </div>

                    <div class="full-width">
                        <input type="submit" name="submit" value="Confirmer mon inscription">
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('eventid');
            if (eventId) {
                document.getElementById('event_field').value = eventId;
            }
        };
    </script>
</body>
</html>
